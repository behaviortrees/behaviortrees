# Netlify build for behaviortrees.com
#
# Overrides any Node version pinned in the Netlify UI (the site was pinned to
# Node 8 from the original behavior3 era). Gulp 3 needs Node <= 22 (see the
# graceful-fs override in apps/editor-classic/package.json); Astro needs >= 20.
#
# With pnpm-lock.yaml at the repo root, Netlify's automatic install runs
# `pnpm install` (version pinned via "packageManager" in package.json). The
# classic editor is installed separately inside build-deploy.sh with
# `npm install --ignore-scripts`, which keeps the ancient electron-prebuilt
# postinstall script from running. NPM_FLAGS is kept in case anything falls
# back to npm.

[build]
  command = "bash build-deploy.sh"
  publish = "deploy"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--ignore-scripts --no-audit --no-fund"

# First-party analytics proxies (ad-blocker resilience). Order matters:
# the /ingest/static rule must precede the /ingest catch-all.
[[redirects]]
  from = "/ingest/static/*"
  to = "https://us-assets.i.posthog.com/static/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/ingest/*"
  to = "https://us.i.posthog.com/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/pl/js/script.js"
  to = "https://plausible.io/js/script.js"
  status = 200
  force = true

[[redirects]]
  from = "/pl/api/event"
  to = "https://plausible.io/api/event"
  status = 200
  force = true
