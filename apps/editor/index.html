<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="shortcut icon" type="image/x-icon" href="/imgs/favicon.ico" />

		<!-- Must run before any stylesheet so the first style resolution already
		     sees the theme. Inline and blocking on purpose: an external file is a
		     round trip, and the round trip is the flash. Kept byte-identical in
		     site/src/layouts/ArticleLayout.astro. -->
		<script>
			(function () {
				try {
					var t = localStorage.getItem('bt-theme') || 'system',
						d = t === 'dark' || (t !== 'light' && matchMedia('(prefers-color-scheme: dark)').matches),
						r = document.documentElement;
					r.dataset.theme = d ? 'dark' : 'light';
					r.style.colorScheme = d ? 'dark' : 'light';
				} catch (e) {
					document.documentElement.dataset.theme = 'dark';
				}
			})();
		</script>
		<link rel="preload" as="font" type="font/woff2" href="/fonts/inter-latin.woff2" crossorigin />

		<title>Behavior Tree Editor - Free Online Visual Editor for Game AI</title>
		<meta
			name="description"
			content="Design behavior trees for game AI and robotics in a free online visual editor. Create sequences, selectors, decorators and custom nodes, then export to JSON. No signup required."
		/>
		<link rel="canonical" href="https://www.behaviortrees.com/" />

		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="behaviortrees.com" />
		<meta property="og:title" content="Behavior Tree Editor - Free Online Visual Editor for Game AI" />
		<meta
			property="og:description"
			content="Design behavior trees for game AI and robotics in a free online visual editor. Export to JSON. No signup required."
		/>
		<meta property="og:url" content="https://www.behaviortrees.com/" />
		<meta property="og:image" content="https://www.behaviortrees.com/imgs/og-image.png" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Behavior Tree Editor - Free Online Visual Editor for Game AI" />
		<meta
			name="twitter:description"
			content="Design behavior trees for game AI and robotics in a free online visual editor. Export to JSON. No signup required."
		/>
		<meta name="twitter:image" content="https://www.behaviortrees.com/imgs/og-image.png" />

		<script defer data-domain="behaviortrees.com" data-api="/pl/api/event" src="/pl/js/script.js"></script>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
